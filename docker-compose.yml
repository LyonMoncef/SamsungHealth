services:
  postgres:
    image: postgres:16-alpine
    container_name: samsunghealth-pg
    environment:
      POSTGRES_USER: samsung
      POSTGRES_PASSWORD: samsung
      POSTGRES_DB: samsunghealth
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samsung -d samsunghealth"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
