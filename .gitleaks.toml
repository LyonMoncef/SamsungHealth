title = "SamsungHealth gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Test fixtures and vault doc mirror — fake secrets, never used in production"
paths = [
  '''^tests/.*''',
  '''^android-app/.*/src/test/.*''',
  '''^android-app/.*/src/androidTest/.*''',
  '''^docs/vault/code/.*''',
]
regexes = [
  '''_TEST_JWT_SECRET\s*=''',
]
